{% set name = "curl-cffi" %}
{% set version = "0.12.1b2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|lower|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 9a2d0c9e164c0425e6bd610455e188a1b8e952392f90cef02e794589a7f02c8f

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [py<39]

requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
    - cffi 1.17.1  # oldest py313
  run:
    - python
    - cffi >=1.12.0
    - certifi >=2024.2.2
  run_constrained:
    - markdownify >=1.1.0
    - readability-lxml >=0.8.1

# Skipped upstream tests where the unittests require proxy and the rest are
# probing external hosts (often httpbin.org) which won't work for all
# platforms.

test:
  source_files:
    - tests
  imports:
    - curl_cffi
    - curl_cffi.const
    - curl_cffi.requests
    - curl_cffi.requests.cookies
    - curl_cffi.requests.errors
    - curl_cffi.requests.exceptions
    - curl_cffi.requests.models
    - curl_cffi.requests.utils
    - curl_cffi.utils
  requires:
    - pip
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"

about:
  home: https://github.com/lexiforest/curl_cffi
  summary: libcurl ffi bindings for Python, with impersonation support.
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: |
    Unlike other pure Python http clients like httpx or requests,
    curl_cffi can impersonate browsers’ TLS signatures or JA3
    fingerprints. If you are blocked by some website for no obvious
    reason, you can give this package a try.
  doc_url: https://curl-cffi.readthedocs.io
  dev_url: https://github.com/lexiforest/curl_cffi

extra:
  recipe-maintainers:
    - jan-janssen